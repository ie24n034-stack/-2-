<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ログイン - シフト管理</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light container py-5" style="max-width: 430px;">
    <div class="card shadow p-4 mt-5">
        <h4 class="text-center mb-4">🔐 シフト管理システム</h4>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, msg in messages %}
                    <div class="alert alert-{{ category }} small">{{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">所属店舗を選択</label>
                <select name="store_name" class="form-select" required>
                    {% for store in stores %}
                        <option value="{{ store.store_name }}">{{ store.store_name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">社員番号 (1〜20)</label>
                <input type="number" name="staff_id" class="form-control" min="1" max="20" placeholder="社員番号を入力" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2">ログイン</button>
        </form>
    </div>
</body>
</html>
