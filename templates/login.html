<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ログイン - シフト管理</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light container py-5" style="max-width: 430px;">
    <div class="card shadow p-4 mt-5">
        <h4 class="text-center mb-4">🔐 シフト管理システム</h4>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, msg in messages %}
                    <div class="alert alert-{{ category }} small">{{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label">所属店舗を選択</label>
                <select name="store_name" class="form-select" required>
                    {% for store in stores %}
                        <option value="{{ store.store_name }}">{{ store.store_name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">社員番号</label>
                <input type="number" name="staff_id" class="form-control" min="1" placeholder="割り当てられた社員番号を入力" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2">ログイン</button>
        </form>

        <hr class="my-4">

        <form action="/add_staff" method="POST" class="mb-3">
            <div class="mb-2">
                <label class="form-label text-primary fw-bold">👤 新しいバイト（スタッフ）を登録する</label>
                <div class="mb-2">
                    <select name="store_name" class="form-select" required>
                        <option value="" disabled selected>所属する店舗を選択</option>
                        {% for store in stores %}
                            <option value="{{ store.store_name }}">{{ store.store_name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="input-group">
                    <input type="text" name="staff_name" class="form-control" placeholder="スタッフの名前（例：山田花子）" required>
                    <button type="submit" class="btn btn-primary">登録</button>
                </div>
            </div>
        </form>

        <hr class="my-4">

        <form action="/delete_staff" method="POST" onsubmit="return confirm('本当にこのスタッフを削除しますか？関連するすべてのシフト・空き時間データが削除され、確定シフトに欠員が出る場合は自動で繰り上げやヘルプ通知が飛びます。');" class="mb-3">
            <div class="mb-2">
                <label class="form-label text-danger fw-bold">👤 バイト（スタッフ）を削除する</label>
                <div class="mb-2">
                    <select name="store_name" class="form-select" required>
                        <option value="" disabled selected>所属する店舗を選択</option>
                        {% for store in stores %}
                            <option value="{{ store.store_name }}">{{ store.store_name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="input-group">
                    <input type="number" name="staff_number" class="form-control" placeholder="削除する社員番号（例：21）" min="1" required>
                    <button type="submit" class="btn btn-danger">削除</button>
                </div>
            </div>
        </form>

        <hr class="my-4">

        <form action="/add_store" method="POST" class="mb-3">
            <div class="mb-2">
                <label class="form-label text-success fw-bold">🆕 新しい店舗を登録する</label>
                <div class="input-group">
                    <input type="text" name="new_store_name" class="form-control" placeholder="例：六本木店" required>
                    <button type="submit" class="btn btn-success">登録</button>
                </div>
            </div>
        </form>

        <form action="/delete_store" method="POST" onsubmit="return confirm('本当にこの店舗と所属データをすべて削除しますか？');">
            <div class="mb-2">
                <label class="form-label text-danger fw-bold">🗑️ 店舗を削除する</label>
                <div class="input-group">
                    <select name="store_name" class="form-select" required>
                        {% for store in stores %}
                            {% if store.store_name != '渋谷店' %}
                                <option value="{{ store.store_name }}">{{ store.store_name }}</option>
                            {% endif %}
                        {% endfor %}
                    </select>
                    <button type="submit" class="btn btn-danger">削除</button>
                </div>
            </div>
        </form>

    </div>
</body>
</html>
